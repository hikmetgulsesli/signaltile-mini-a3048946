<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SignalTile Mini</title>
    <link rel="stylesheet" href="assets/css/styles.css" />
  </head>
  <body>
    <main data-setfarm-root="baseline" data-testid="setfarm-app-root" class="app-shell">
      <header class="app-header">
        <h1>SignalTile Mini</h1>
        <nav class="app-nav" aria-label="Primary">
          <a href="#operations" data-action-id="nav-operations" onclick="window.app && window.app.navigateTo('operations')">Operations</a>
          <a href="#editor" data-action-id="nav-editor" onclick="window.app && window.app.navigateTo('editor')">Editor</a>
          <a href="#insights" data-action-id="nav-insights" onclick="window.app && window.app.navigateTo('insights')">Insights</a>
          <a href="#support" data-action-id="nav-support" onclick="window.app && window.app.navigateTo('support')">Support</a>
          <a href="#documentation" data-action-id="nav-documentation" onclick="window.app && window.app.navigateTo('documentation')">Documentation</a>
        </nav>
      </header>

      <section class="app-body">
        <div id="status-banner" class="status-banner" role="status" aria-live="polite"></div>

        <section id="tile-panel" class="tile-panel" aria-label="Signal tiles">
          <!-- Tiles are rendered by app.js -->
        </section>

        <section class="app-actions">
          <button type="button" class="btn btn-primary" data-action-id="export-summary" onclick="window.app && window.app.exportSnapshot()">Export JSON snapshot</button>
        </section>

        <pre id="snapshot-output" class="snapshot-output" aria-live="polite"></pre>
      </section>
    </main>

    <script src="assets/js/signaltile-mini.state.js" defer></script>
    <script src="assets/js/signaltile-mini.storage.js" defer></script>
    <script src="assets/js/app.js" defer></script>
    <script src="assets/js/test-bridge.js" defer></script>
  </body>
</html>
